version: "3.9"

# ClickHouse: fast columnar OLAP database.
# HTTP interface: http://localhost:8123  |  Native TCP: 9000
services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
