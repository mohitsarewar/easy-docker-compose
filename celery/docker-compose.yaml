version: "3.9"

# There is no official standalone celery Docker image.
# This uses the official Python image to install and run a Celery worker.
# Place your tasks.py in the ./app directory.
services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  celery:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app:/app
    command: >
      sh -c "pip install --quiet celery redis &&
             celery -A tasks worker --loglevel=info"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
