version: "3.9"

# HashiCorp Vault in dev mode. UI at http://localhost:8200
# Root token: my_root_token  (dev mode only — do not use in production)
services:
  vault:
    image: hashicorp/vault:latest
    command: server -dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: my_root_token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
