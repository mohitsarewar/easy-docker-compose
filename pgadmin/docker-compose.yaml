version: "3.9"

# PostgreSQL web admin UI at http://localhost:5050
# Default login: admin@admin.com / my_password
services:
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: my_password
    volumes:
      - ./pgadmin-data:/var/lib/pgadmin
