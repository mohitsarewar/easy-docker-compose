version: "3.9"

# Using the management tag to include the web UI at http://localhost:15672
# Default login: my_user / my_password
services:
  rabbitmq:
    image: rabbitmq:management
    environment:
      RABBITMQ_DEFAULT_USER: my_user
      RABBITMQ_DEFAULT_PASS: my_password
    ports:
      - "5672:5672"
      - "15672:15672"
