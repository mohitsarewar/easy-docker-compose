version: "3.9"

# Apache Superset: data exploration and visualization. UI at http://localhost:8088
# Default login: admin / admin
services:
  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: my_secret_key_change_in_production
    command: >
      sh -c "superset db upgrade &&
             superset fab create-admin --username admin --firstname Admin --lastname User --email admin@admin.com --password admin &&
             superset init &&
             superset run -h 0.0.0.0 -p 8088"
    volumes:
      - ./superset-data:/app/superset_home
